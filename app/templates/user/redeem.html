<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Team 兑换</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/user.css') }}">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="redeem-page">
    <div class="page-backdrop" aria-hidden="true">
        <div class="backdrop-orb orb-a"></div>
        <div class="backdrop-orb orb-b"></div>
        <div class="backdrop-grid"></div>
        <div class="backdrop-noise"></div>
    </div>

    <main class="container">
        <header class="header">
            <p class="eyebrow">Invitation Portal</p>
            <h1>GPT Team 兑换</h1>
            <p class="subtitle">使用兑换码加入 ChatGPT Team</p>
            {% if remaining_spots is not none %}
            <div class="spots-badge">
                <i data-lucide="users" class="icon-xxs"></i>
                <span>剩余车位</span>
                <strong>{{ remaining_spots }}</strong>
            </div>
            {% endif %}
        </header>

        <!-- 步骤1: 输入兑换码 -->
        <section id="step1" class="step active">
            <div class="card glass-card">
                <h2 class="card-title">输入兑换信息</h2>
                <form id="verifyForm">
                    <div class="form-group">
                        <label for="email">邮箱地址</label>
                        <input type="email" id="email" name="email" required placeholder="请输入您的邮箱地址" class="form-input">
                        <p class="form-help">请填写您要接受邀请的账号的邮箱，邀请将发送到此邮箱</p>
                    </div>

                    <div class="form-group">
                        <label for="code">兑换码</label>
                        <input type="text" id="code" name="code" required placeholder="请输入兑换码" class="form-input">
                    </div>

                    <button type="submit" class="btn btn-primary" id="verifyBtn">
                        <i data-lucide="shield-check"></i> 验证兑换码
                    </button>
                </form>

                <!-- 质保查询区域 -->
                <section class="warranty-section">
                    <h3 class="warranty-title">
                        <i data-lucide="shield" class="icon-sm"></i>
                        质保查询
                    </h3>
                    <p class="form-help warranty-desc">
                        如果您使用质保兑换码加入的 Team 被封号，可以在质保期内（一个月）重复使用原兑换码
                    </p>
                    <div class="form-group form-group-tight">
                        <input type="text" id="warrantyInput" placeholder="请输入原兑换码或邮箱进行查询" class="form-input">
                    </div>
                    <button type="button" class="btn btn-secondary" id="checkWarrantyBtn" onclick="checkWarranty()">
                        <i data-lucide="search"></i> 查询质保状态
                    </button>
                </section>
            </div>
        </section>

        <!-- 质保查询结果 -->
        <section id="warrantyResult" class="step">
            <div class="card glass-card">
                <h2 class="card-title">质保查询结果</h2>
                <div id="warrantyContent">
                    <!-- 质保结果将通过JavaScript动态生成 -->
                </div>
                <div class="actions">
                    <button onclick="backToStep1()" class="btn btn-secondary">返回兑换</button>
                </div>
            </div>
        </section>

        <!-- 步骤2: 选择Team (已废弃，保留占位符防止 JS 报错) -->
        <section id="step2" class="step">
            <div class="card glass-card">
                <h2 class="card-title">选择 Team</h2>
                <div id="teamsList" class="teams-list"></div>
                <div class="actions actions-split">
                    <button onclick="backToStep1()" class="btn btn-secondary">返回</button>
                    <button onclick="autoSelectTeam()" class="btn btn-primary">自动选择</button>
                </div>
            </div>
        </section>

        <!-- 步骤3: 兑换结果 -->
        <section id="step3" class="step">
            <div class="card glass-card">
                <div id="resultContent">
                    <!-- 结果内容将通过JavaScript动态生成 -->
                </div>
            </div>
        </section>
    </main>

    <!-- Toast提示 -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', path='/js/redeem.js') }}"></script>
    <script>
        if (window.lucide) lucide.createIcons();
    </script>
</body>

</html>
