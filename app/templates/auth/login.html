{% extends "base.html" %}

{% block title %}登录 - GPT Team 管理系统{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='/css/login.css') }}">
{% endblock %}

{% block auth_content %}
<div class="login-shell">
    <div class="login-backdrop" aria-hidden="true">
        <div class="login-orb login-orb-a"></div>
        <div class="login-orb login-orb-b"></div>
        <div class="login-grid"></div>
        <div class="login-noise"></div>
    </div>
    <div class="login-container">
        <div class="login-box">
            <p class="login-eyebrow">Admin Access</p>
            <h2>管理员登录</h2>
            <p class="login-subtitle">输入管理员密码继续管理 Team 账号</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="请输入管理员密码"
                        required
                        autocomplete="current-password"
                    >
                </div>
                <div id="errorMessage" class="error-message" aria-live="polite"></div>
                <button type="submit" class="btn btn-primary login-submit">登录</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleLogin(event) {
    event.preventDefault();

    const password = document.getElementById('password').value;
    const errorMessage = document.getElementById('errorMessage');
    const submitButton = event.target.querySelector('button[type="submit"]');

    // 禁用提交按钮
    submitButton.disabled = true;
    submitButton.textContent = '登录中...';
    errorMessage.classList.remove('show');

    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            // 登录成功,跳转到管理员面板
            window.location.href = '/admin';
        } else {
            // 显示错误信息
            errorMessage.textContent = data.error || '登录失败';
            errorMessage.classList.add('show');
            submitButton.disabled = false;
            submitButton.textContent = '登录';
        }
    } catch (error) {
        errorMessage.textContent = '网络错误,请稍后重试';
        errorMessage.classList.add('show');
        submitButton.disabled = false;
        submitButton.textContent = '登录';
    }
}
</script>
{% endblock %}
